[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short
filterwarnings =
    error::RuntimeWarning
    error::DeprecationWarning
    error::pytest.PytestRemovedIn10Warning
    ignore:builtin type .* has no __module__:DeprecationWarning
    ignore::DeprecationWarning:wcwidth.*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    needs_llm: marks tests requiring a real LLM
    needs_embedding: marks tests requiring a real embedding API
    db: tests that require database and Qdrant initialization
    docker: tests that require a running Docker stack
