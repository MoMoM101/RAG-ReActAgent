services:
  qdrant:
    image: qdrant/qdrant:v1.13.0
    # Qdrant ports are NOT exposed to the host by default.
    # To debug, uncomment the ports section and restart:
    # ports:
    #   - "127.0.0.1:6333:6333"
    #   - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - DATABASE_URL=sqlite+aiosqlite:///./data/rag_agent.db
      - QDRANT_PATH=./data/qdrant
      - UPLOAD_DIR=./data/uploads
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - ALLOW_REMOTE_ACCESS=${ALLOW_REMOTE_ACCESS:-false}
    volumes:
      - backend_data:/app/data
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_data:
