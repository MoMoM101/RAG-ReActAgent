name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which commit or version are you running?
      placeholder: "e.g. main @ 9f5f16b"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Docker
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Screenshots
      description: Paste any relevant logs, error messages, or screenshots.
      render: text

  - type: textarea
    id: config
    attributes:
      label: Configuration (redacted)
      description: |
        Run `cat backend/.env | sed 's/=.*/=***/'` and paste the output.
        This helps us understand your setup without exposing API keys.
      render: text
