name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check agent/ api/ --config ../pyproject.toml

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --ignore=tests/rag --ignore=tests/reranker --ignore=tests/embedding \
            --ignore=tests/llm --ignore=tests/vectordb \
            --cov=agent --cov-report=term-missing -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ruff check
        uses: astral-sh/ruff-action@v1
        with:
          src: "backend/agent backend/api"
